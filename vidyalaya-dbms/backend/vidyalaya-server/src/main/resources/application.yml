spring:
  application:
    name: vidyalaya-server
  # Tenant primary DataSource is a router; SQL script init would create a bean cycle with JPA.
  sql:
    init:
      mode: never
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        boot:
          allow_jdbc_metadata_access: false
  thymeleaf:
    cache: false

server:
  port: 8080

vidyalaya:
  jwt:
    secret: ${JWT_SECRET:01234567890123456789012345678901}
    access-token-minutes: 15
    refresh-token-days: 7
  # Local demo only: GET /api/auth/dev-token issues super-admin JWT without password (profile `dev` only).
  dev:
    open-api: false
  master-datasource:
    url: ${MASTER_DB_URL:jdbc:postgresql://localhost:5433/vidyalaya_master}
    username: ${MASTER_DB_USER:vidyalaya}
    password: ${MASTER_DB_PASSWORD:vidyalaya}
  super-admin:
    username: ${SUPER_ADMIN_USERNAME:superadmin}
    # Single-quoted so "!" in default is literal; Spring still resolves ${...} after YAML parse
    password: '${SUPER_ADMIN_PASSWORD:ChangeMe123!}'
  encryption:
    key: ${VIDYALAYA_ENCRYPTION_KEY:MTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTI=}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://[::1]:5173}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] rid=%X{rid:-} %logger{36} - %msg%n"
  level:
    root: INFO
    com.vidyalaya: INFO
    org.springframework.security: INFO
    org.springframework.web.servlet.DispatcherServlet: WARN

---
# Verbose API / domain logs: mvn spring-boot:run -Dspring-boot.run.profiles=api-debug
spring:
  config:
    activate:
      on-profile: api-debug
logging:
  level:
    com.vidyalaya: DEBUG
    org.springframework.jdbc.core: DEBUG
